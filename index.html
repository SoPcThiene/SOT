<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PC THIENE - APP SQUADRE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="logosala.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script src="config.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; background: #0f172a; color: white; 
            height: 100vh; height: 100dvh; overflow: hidden; display: flex; 
            flex-direction: column; margin: 0; font-weight: 500; 
        }
        
        /* SCHERMATE DI SISTEMA */
        #off-screen, #login-screen, #team-select-screen { 
            position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 16px; text-align: center; 
            background: #020617; overflow: hidden; 
        }
        #login-screen { z-index: 20000; } 
        #team-select-screen { z-index: 30000; }

        @keyframes spin-chase { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes soft-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .logo-container { animation: soft-pulse 3s ease-in-out infinite; }
        .chasing-border-blue { position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(from 0deg, transparent 60%, #3b82f6 100%); animation: spin-chase 1.5s linear infinite; }
        .inner-circle { position: absolute; inset: 5px; background-color: #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: inset 0px 0px 25px rgba(0,0,0,0.9); }

        /* BOTTONI OPERATIVI */
        .btn-status { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; transition: 0.2s; border-bottom-width: 4px; height: 55px; font-weight: 700; text-transform: uppercase; font-size: 10px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); cursor: pointer; outline: none; }
        .btn-status span { font-size: 22px; margin-bottom: 2px; }
        .btn-status:active { transform: scale(0.95); }
        
        .btn-media { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; background: #1e293b; border: 1px solid #334155; height: 60px; transition: 0.2s; cursor: pointer; outline: none; }
        .btn-media:active { background: #334155; transform: scale(0.95); }
        
        /* FIX VIDEO QR CODE */
        #qr-reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; border: 2px solid #334155; position: relative; }
        #qr-reader video { width: 100% !important; height: auto !important; object-fit: cover; }
        
        /* Linea di scansione animata */
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #10b981; box-shadow: 0 0 10px #10b981; animation: moveScan 2s linear infinite; z-index: 100; }
        @keyframes moveScan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div id="team-select-screen" style="display: none;">
        <div class="relative h-64 w-64 shrink-0 mb-6 mx-auto rounded-full logo-container" style="box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);">
            <div class="chasing-border-blue"></div>
            <div class="inner-circle p-2">
                <img src="logosala.png" alt="Logo" class="w-full h-full object-contain drop-shadow-2xl relative z-20">
            </div>
        </div>
        
        <h1 class="font-black text-2xl mb-1 text-white tracking-tight uppercase leading-none">Protezione Civile Thiene</h1>
        <h2 class="font-bold text-[10px] mb-6 text-emerald-400 tracking-[0.3em] uppercase text-center text-shadow">SALA OPERATIVA</h2>
        
        <div class="relative z-20 bg-slate-800/80 border border-slate-600 rounded-3xl p-5 w-full max-w-[340px] shadow-2xl flex flex-col items-center backdrop-blur-md mb-8">
            <div id="qr-reader" class="w-full mb-3" style="display: none;">
                <div class="scan-line"></div>
            </div>
            
            <button onclick="window.startQRScanner()" id="btn-start-qr" class="w-full bg-gradient-to-r from-slate-700 to-slate-600 border border-slate-500 py-4 rounded-2xl font-black uppercase text-xs mb-5 text-white flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-all">
                <span class="text-2xl">📷</span> INQUADRA QR SALA
            </button>
            
            <div class="w-full h-px bg-slate-600 mb-5 relative"><span class="absolute left-1/2 -top-2.5 -translate-x-1/2 bg-slate-800 px-4 py-0.5 rounded-full text-[9px] text-slate-400 font-bold uppercase tracking-widest border border-slate-700">Oppure ID Manuale</span></div>

            <input type="text" id="team-input" class="bg-slate-900 border-2 border-slate-600 rounded-xl text-center text-4xl text-white py-4 w-full tracking-[0.2em] outline-none focus:border-emerald-500 transition-colors uppercase mb-4 font-black" placeholder="SQ1">
            
            <button onclick="window.saveNewTeam()" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 py-4 rounded-xl font-black uppercase text-sm shadow-lg active:scale-95 text-white">CONFERMA UNITÀ</button>
        </div>

        <div class="absolute bottom-10 left-0 w-full text-center">
            <div class="text-[14px] font-mono font-black tracking-[0.4em] uppercase mb-1">
                <span class="text-white">JOK</span><span class="text-red-600">ART</span>
            </div>
            <div class="text-[8px] font-bold text-slate-500 tracking-widest uppercase">Support: so.pcthiene@gmail.com</div>
        </div>
    </div>

    <div id="login-screen" style="display: none;">
        <div class="relative h-64 w-64 shrink-0 mb-6 mx-auto rounded-full logo-container" style="box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);">
            <div class="chasing-border-blue"></div>
            <div class="inner-circle p-2">
                <img src="logosala.png" alt="Logo" class="w-full h-full object-contain drop-shadow-2xl relative z-20">
            </div>
        </div>
        <h1 class="font-black text-2xl mb-1 text-white tracking-tight uppercase leading-none text-center">Protezione Civile Thiene</h1>
        <h2 class="font-bold text-[10px] mb-8 text-blue-400 tracking-[0.3em] uppercase text-center">SBLOCCO TERMINALE</h2>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-3 relative z-20">Inserire PIN per <b id="login-sq-name" class="text-white text-sm">...</b></p>
        <input type="password" id="pin-input" class="relative z-20 bg-slate-900 border-2 border-slate-600 rounded-xl text-center text-5xl text-white py-4 w-full max-w-[260px] mb-6 tracking-[0.4em] outline-none focus:border-blue-500 font-black" placeholder="****" inputmode="numeric" maxlength="4">
        <button onclick="window.checkPin()" class="relative z-20 w-full max-w-[260px] bg-gradient-to-r from-blue-600 to-blue-500 py-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 text-white">SBLOCCA UNITÀ</button>
        <button onclick="window.logoutApp(false)" class="relative z-20 mt-10 text-[11px] font-black text-slate-500 underline uppercase tracking-[0.2em]">🔄 CAMBIA UNITÀ</button>
    </div>

    <header class="px-3 py-3 bg-slate-900 border-b border-slate-700 flex justify-between items-center shrink-0 shadow-xl">
        <div class="flex items-center gap-3 w-full">
            <div class="h-14 w-14 flex shrink-0 items-center justify-center overflow-hidden"><img src="logosala.png" alt="Logo" class="w-full h-full object-contain"></div>
            <div class="flex flex-col flex-1">
                <div class="text-[7.5px] font-bold text-slate-400 uppercase tracking-widest mb-0.5 leading-none">Protezione Civile Thiene <span class="text-blue-500 font-black">•</span> Terminale</div>
                <div class="flex items-center justify-between"><h1 id="display-sq" class="font-black text-2xl tracking-tighter text-blue-400 leading-none">---</h1><div id="clock" class="font-mono text-base font-bold text-yellow-500 leading-none">00:00</div></div>
                <div id="display-capo" class="text-[10px] font-bold text-slate-300 uppercase tracking-widest mt-1 truncate w-48">CAPO: ---</div>
                <div class="flex items-center justify-between mt-1"><div id="current-status" class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest bg-emerald-900/30 px-1.5 py-0.5 rounded border border-emerald-800">ATTESA...</div><div class="flex gap-1"><div id="net-badge" class="inline-block text-[7px] bg-emerald-500/20 text-emerald-400 px-1.5 py-0.5 rounded border border-emerald-500/30 font-bold uppercase">ONLINE</div></div></div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col w-full px-3 py-3 gap-2.5 overflow-y-auto pb-8">
        <div id="target-banner" class="shrink-0 w-full bg-slate-800/50 rounded-xl p-3 border border-slate-700/50 shadow-inner flex flex-col justify-center min-h-[60px] text-center"><span class="text-slate-500 text-[10px] uppercase font-bold italic tracking-widest">Nessun Target in corso</span></div>
        <div class="shrink-0 flex flex-col gap-2">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="window.askStatus('Sede', '🏠')" class="btn-status bg-emerald-600 border-emerald-800 text-white"><span>🏠</span> Sede</button>
                <button onclick="window.askStatus('Uscita', '🚚')" class="btn-status bg-amber-500 border-amber-700 text-slate-900"><span>🚚</span> Uscita</button>
                <button onclick="window.askStatus('Trasferimento', '🚐')" class="btn-status bg-violet-600 border-violet-800 text-white"><span>🚐</span> Trasf.</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="window.askStatus('Intervento', '🚨')" class="btn-status bg-red-600 border-red-800 text-white"><span>🚨</span> Sul Posto</button>
                <button onclick="window.askStatus('Rientro', '🔙')" class="btn-status bg-sky-500 border-sky-700 text-white"><span>🔙</span> Rientro</button>
            </div>
        </div>
        <div class="shrink-0 grid grid-cols-3 gap-2">
            <button onclick="document.getElementById('file-foto').click()" class="btn-media text-white hover:bg-slate-700"><span>📷</span><span class="text-[9px] font-bold">FOTO</span></button>
            <button id="btn-voc" class="btn-media text-white hover:bg-slate-700"><span id="voc-icon">🎤</span><span id="voc-txt" class="text-[9px] font-bold">VOCALE</span></button>
            <button onclick="window.openGPSPanel()" class="btn-media text-emerald-400 hover:bg-slate-700"><span>📍</span><span class="text-[9px] font-bold">POSIZIONE</span></button>
        </div>
        <input type="file" id="file-foto" accept="image/*" capture="camera" class="hidden" onchange="window.upFoto(this.files[0])">
        <div class="mt-auto shrink-0 bg-slate-800 p-2.5 rounded-xl border border-slate-600 flex flex-col gap-2 shadow-lg"><textarea id="msg-input" class="w-full bg-slate-600 border border-slate-500 rounded-lg p-2.5 text-sm placeholder-slate-300 resize-none h-14 text-white focus:outline-none focus:border-blue-400" placeholder="Scrivi alla sala..."></textarea><button onclick="window.askFreeMsg()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-black uppercase text-[11px] shadow-lg active:scale-95 transition-all text-white">Invia alla Sala</button></div>
        <div class="shrink-0 mt-2"><button onclick="window.logoutApp(false)" class="w-full py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg text-slate-400 font-black uppercase text-[10px] tracking-widest">🚪 DISCONNETTI E CAMBIA UNITÀ</button></div>
        
        <div class="shrink-0 text-center pb-2 pt-2 opacity-80">
            <div class="text-[12px] font-mono font-black tracking-[0.3em] uppercase">
                <span class="text-white">JOK</span><span class="text-red-600">ART</span>
            </div>
            <div class="text-[7px] font-bold text-slate-500 uppercase tracking-tighter">so.pcthiene@gmail.com</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, query, limitToLast, get } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // CONFIGURAZIONE
        const config = window.APP_CONFIG || {};
        let db = null;
        if (config.firebaseSettings) { try { const app = initializeApp(config.firebaseSettings); db = getDatabase(app); } catch(e) { console.error(e); } }

        let sqId = null; window.targetCompletato = null;
        const savedSqId = localStorage.getItem('pc_app_saved_team');
        if (savedSqId) { sqId = savedSqId; verificaSquadraELogin(); } 
        else { document.getElementById('team-select-screen').style.display = 'flex'; }

        // --- MOTORE SCANNER QR ULTRA-RESPONSIVO ---
        let html5QrCode = null;
        window.startQRScanner = async () => {
            const container = document.getElementById('qr-reader');
            document.getElementById('btn-start-qr').style.display = 'none';
            container.style.display = 'block';

            // Reset totale per evitare fotocamera bloccata
            if (html5QrCode) { try { await html5QrCode.stop(); await html5QrCode.clear(); } catch(e){} }
            html5QrCode = new Html5Qrcode("qr-reader");

            const qrConfig = {
                fps: 25, // Velocità massima per lettura istantanea
                qrbox: (w, h) => { return { width: w * 0.8, height: w * 0.8 }; }, // Area di scansione grande
                aspectRatio: 1.0
            };

            html5QrCode.start(
                { facingMode: "environment" },
                qrConfig,
                (decodedText) => {
                    // Lettura immediata
                    html5QrCode.stop().then(() => {
                        container.style.display = 'none';
                        window.processQR(decodedText);
                    });
                },
                (errorMessage) => {} // Ignora frame vuoti
            ).catch((err) => {
                document.getElementById('btn-start-qr').style.display = 'flex';
                container.style.display = 'none';
                Swal.fire({ icon: 'error', title: 'FOTOCAMERA OCCUPATA', text: "Chiudi le altre app o ricarica la pagina.", background: '#0f172a', color: '#fff' });
            });
        };

        window.processQR = (text) => {
            let extractedId = text.trim();
            try {
                if (text.includes('?id=')) extractedId = new URL(text).searchParams.get('id');
                else if (text.includes('?sq=')) extractedId = new URL(text).searchParams.get('sq');
            } catch(e) {}
            if(extractedId) {
                localStorage.setItem('pc_app_saved_team', extractedId.toUpperCase());
                location.reload(); 
            }
        };

        window.saveNewTeam = () => { const val = document.getElementById('team-input').value.trim().toUpperCase(); if (!val) return; localStorage.setItem('pc_app_saved_team', val); location.reload(); };

        // --- LOGOUT E CAMBIO UNITÀ ---
        window.logoutApp = () => {
            localStorage.removeItem('pc_app_auth');
            localStorage.removeItem('pc_app_saved_team');
            location.reload(); 
        };

        function verificaSquadraELogin() {
            if (!db) return;
            document.getElementById('display-sq').innerText = sqId;
            document.getElementById('login-sq-name').innerText = sqId;
            document.getElementById('team-select-screen').style.display = 'none';
            get(ref(db, 'anagrafica_squadre/' + sqId)).then((snap) => {
                if (!snap.exists()) { window.logoutApp(); return; }
                if(localStorage.getItem('pc_app_auth') === 'true') { avviaMotoreApp(); } 
                else { document.getElementById('login-screen').style.display = 'flex'; }
            });
        }

        window.checkPin = () => {
            if(document.getElementById('pin-input').value === (config.pinAccesso || "2026")) {
                localStorage.setItem('pc_app_auth', 'true');
                location.reload();
            } else {
                Swal.fire({ icon: 'error', title: 'PIN Errato', background: '#1e293b', color: '#fff' });
            }
        };

        function avviaMotoreApp() {
            document.querySelectorAll('header, main').forEach(el => el.style.display = 'flex');
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }); }, 1000);
            onValue(ref(db, `anagrafica_squadre/${sqId}`), (snap) => {
                const sq = snap.val(); if (sq) {
                    document.getElementById('display-capo').innerText = `CAPO: ${sq.capo?.toUpperCase() || '---'}`;
                    document.getElementById('current-status').innerText = sq.stato?.toUpperCase() || 'ATTESA';
                }
            });
            onValue(query(ref(db, 'brogliaccio'), limitToLast(30)), (snap) => {
                const data = snap.val(); if (!data) return;
                const logs = Object.entries(data).map(([id, val]) => ({ id, ...val })).reverse();
                const target = logs.find(l => l.dir === 'SA' && l.squadra === sqId && l.m1?.includes('📍') && l.id !== window.targetCompletato);
                const banner = document.getElementById('target-banner');
                if (target) {
                    banner.className = "shrink-0 w-full bg-blue-900/80 rounded-xl p-3 border border-blue-500 shadow-lg flex flex-col gap-2";
                    banner.innerHTML = `<div class="flex items-center gap-2"><span class="text-2xl">🚐</span><span class="text-[12px] text-white font-black truncate">${target.m1.replace('📍','')}</span></div><div class="flex gap-2"><button onclick="window.navig(${target.lat}, ${target.lng})" class="flex-1 bg-emerald-600 py-2 rounded-lg font-black text-[9px] text-white">📍 NAVIGA</button><button onclick="window.cArr('${target.id}')" class="flex-1 bg-red-600 py-2 rounded-lg font-black text-[9px] text-white">🏁 SUL POSTO</button></div>`;
                } else { banner.innerHTML = `<div class="text-center text-slate-500 text-[10px] uppercase font-bold italic tracking-widest">Nessun Target attivo</div>`; }
            });
        }

        window.askStatus = (s, icon) => { Swal.fire({ title: `CONFERMI ${s.toUpperCase()}?`, background: '#1e293b', color: '#fff', showCancelButton: true }).then((r) => { if(r.isConfirmed) update(ref(db, `anagrafica_squadre/${sqId}`), { stato: s, ultimo_contatto: Date.now() }); }); };
        window.askFreeMsg = () => { const t = document.getElementById('msg-input').value.trim(); if(!t) return; push(ref(db, 'brogliaccio'), { ora: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }), data: new Date().toLocaleDateString('it-IT'), squadra: sqId, m1: t.toUpperCase(), dir: 'SQ', stato: 'OK' }); document.getElementById('msg-input').value = ""; };
        window.navig = (lat, lng) => { window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`, '_blank'); };
        window.cArr = (id) => { window.targetCompletato = id; update(ref(db, `anagrafica_squadre/${sqId}`), { stato: 'Intervento' }); };
    </script>
</body>
</html>
